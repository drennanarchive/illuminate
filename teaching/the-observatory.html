<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#07111f" />
  <title>The Observatory</title>
  <style>
    :root {
      --bg-deep: #050812;
      --bg-mid: #0a1220;
      --bg-soft: #11192a;
      --ink: #f6f7fb;
      --muted: #aab4c7;
      --line: rgba(255,255,255,.12);
      --glass: rgba(8, 14, 26, .72);
      --glow: rgba(203, 218, 255, .65);
      --gold: #ffd98a;
      --blue: #9bc7ff;
      --violet: #c8b6ff;
      --pink: #ffb8dc;
      --green: #a9f0d1;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      min-height: 100%;
      background: var(--bg-deep);
      color: var(--ink);
      font-family: "Segoe UI", ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      overflow: hidden;
    }

    body {
      position: relative;
      min-height: 100svh;
      background:
        radial-gradient(circle at 15% 20%, rgba(91, 111, 170, .18), transparent 28%),
        radial-gradient(circle at 82% 22%, rgba(100, 84, 154, .13), transparent 22%),
        radial-gradient(circle at 70% 82%, rgba(54, 112, 145, .1), transparent 30%),
        linear-gradient(180deg, var(--bg-soft) 0%, var(--bg-mid) 45%, var(--bg-deep) 100%);
    }

    #starfield,
    #shooting-layer,
    #constellation-layer {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
    }

    #starfield { z-index: 0; }
    #shooting-layer { z-index: 1; pointer-events: none; }
    #constellation-layer { z-index: 2; }

    .grain {
      position: fixed;
      inset: 0;
      z-index: 3;
      pointer-events: none;
      opacity: .16;
      mix-blend-mode: soft-light;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 180 180' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.95' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='.16'/%3E%3C/svg%3E");
    }

    .brand {
      position: fixed;
      top: 28px;
      left: 32px;
      z-index: 5;
      max-width: 330px;
      pointer-events: none;
    }

    .brand .eyebrow {
      margin: 0 0 10px;
      color: rgba(204,218,241,.72);
      font-size: .66rem;
      letter-spacing: .26em;
      text-transform: uppercase;
    }

    .brand h1 {
      margin: 0;
      font-size: clamp(2rem, 5vw, 4.4rem);
      font-family: Georgia, "Times New Roman", serif;
      font-weight: 400;
      letter-spacing: -.045em;
      line-height: .92;
    }

    .brand p {
      margin: 17px 0 0;
      color: rgba(204,218,241,.72);
      font-family: Georgia, "Times New Roman", serif;
      font-size: .98rem;
      font-style: italic;
      line-height: 1.5;
      letter-spacing: .01em;
    }

    .constellation-star {
      --size: 14px;
      position: absolute;
      width: var(--size);
      height: var(--size);
      border: 0;
      padding: 0;
      border-radius: 50%;
      cursor: pointer;
      background: #f7fbff;
      box-shadow:
        0 0 8px rgba(255,255,255,.95),
        0 0 22px var(--glow),
        0 0 44px rgba(115, 158, 255, .18);
      transform: translate(-50%, -50%);
      animation: star-breathe 3.6s ease-in-out infinite;
      transition: transform .25s ease, box-shadow .25s ease, background .25s ease;
    }

    .constellation-star::before,
    .constellation-star::after {
      content: "";
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      background: linear-gradient(90deg, transparent, rgba(255,255,255,.72), transparent);
      pointer-events: none;
      opacity: .7;
    }

    .constellation-star::before { width: calc(var(--size) * 3.8); height: 1px; }
    .constellation-star::after { width: 1px; height: calc(var(--size) * 3.8); }

    .constellation-star:hover,
    .constellation-star:focus-visible {
      outline: none;
      transform: translate(-50%, -50%) scale(1.35);
      box-shadow:
        0 0 12px rgba(255,255,255,1),
        0 0 30px var(--glow),
        0 0 72px rgba(128, 170, 255, .35);
    }

    .constellation-star.explored {
      background: var(--gold);
      box-shadow:
        0 0 10px rgba(255,225,163,1),
        0 0 25px rgba(255,203,104,.68),
        0 0 60px rgba(255,184,78,.24);
    }

    .constellation-star .label {
      position: absolute;
      left: 50%;
      top: calc(100% + 16px);
      transform: translateX(-50%);
      white-space: nowrap;
      color: rgba(237, 242, 252, .9);
      font-family: Georgia, "Times New Roman", serif;
      font-size: .8rem;
      font-style: italic;
      letter-spacing: .015em;
      opacity: 0;
      pointer-events: none;
      transition: opacity .18s ease, transform .18s ease;
      text-shadow: 0 2px 12px rgba(0,0,0,.8);
    }

    .constellation-star:hover .label,
    .constellation-star:focus-visible .label {
      opacity: 1;
      transform: translate(-50%, 2px);
    }

    .progress-card {
      position: fixed;
      left: 28px;
      bottom: 26px;
      z-index: 5;
      width: min(260px, calc(100vw - 56px));
      padding: 16px 18px;
      border: 1px solid var(--line);
      border-radius: 22px;
      background: linear-gradient(145deg, rgba(13,20,35,.44), rgba(7,12,22,.30));
      backdrop-filter: blur(14px);
      box-shadow: 0 18px 50px rgba(0,0,0,.28);
    }

    .progress-card small {
      display: block;
      color: rgba(194,209,234,.64);
      font-size: .61rem;
      letter-spacing: .27em;
      text-transform: uppercase;
      margin-bottom: 9px;
    }

    .progress-row {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 12px;
    }

    .progress-row strong { font-family: Georgia, "Times New Roman", serif; font-size: 1.02rem; font-weight: 400; font-style: italic; }
    .progress-row span { color: var(--muted); font-size: .86rem; }

    .reset-btn {
      margin-top: 12px;
      padding: 0;
      border: 0;
      background: transparent;
      color: rgba(199, 210, 229, .68);
      font: inherit;
      font-size: .72rem;
      letter-spacing: .04em;
      cursor: pointer;
      transition: color .2s ease;
    }

    .reset-btn:hover, .reset-btn:focus-visible { color: var(--ink); outline: none; }
    .reset-btn.confirm { color: #ffd98a; }

    .panel-backdrop {
      position: fixed;
      inset: 0;
      z-index: 9;
      background: rgba(3, 7, 15, .08);
      backdrop-filter: blur(1.5px);
      opacity: 0;
      pointer-events: none;
      transition: opacity .3s ease;
    }

    .panel-backdrop.open { opacity: 1; pointer-events: auto; }

    .panel {
      position: fixed;
      left: 50%;
      top: 50%;
      z-index: 10;
      width: min(620px, calc(100vw - 44px));
      max-height: min(72svh, 650px);
      padding: 34px 38px 30px;
      border: 1px solid rgba(255,255,255,.15);
      border-radius: 30px;
      background:
        radial-gradient(circle at 50% -20%, color-mix(in srgb, var(--panel-accent, var(--blue)) 18%, transparent), transparent 44%),
        linear-gradient(180deg, rgba(16, 24, 40, .58), rgba(7, 12, 23, .54));
      backdrop-filter: blur(15px) saturate(118%);
      box-shadow: 0 28px 100px rgba(0,0,0,.34), 0 0 70px color-mix(in srgb, var(--panel-accent, var(--blue)) 10%, transparent);
      transform: translate(-50%, -46%) scale(.95);
      transform-origin: 50% 50%;
      opacity: 0;
      transition: transform .48s cubic-bezier(.2,.8,.2,1), opacity .35s ease;
      overflow-y: auto;
      pointer-events: none;
    }

    .panel::before {
      content: "✦";
      position: absolute;
      left: 50%;
      top: 14px;
      transform: translateX(-50%);
      color: var(--panel-accent, var(--blue));
      font-size: .8rem;
      text-shadow: 0 0 18px currentColor;
    }

    .panel::after {
      content: "";
      position: absolute;
      left: 50%;
      top: -58px;
      width: 116px;
      height: 116px;
      transform: translateX(-50%) rotate(-10deg);
      border: 1px solid color-mix(in srgb, var(--panel-accent, var(--blue)) 34%, transparent);
      border-radius: 50%;
      box-shadow: inset 0 0 28px color-mix(in srgb, var(--panel-accent, var(--blue)) 10%, transparent);
      pointer-events: none;
    }

    .panel.open { transform: translate(-50%, -50%) scale(1); opacity: 1; pointer-events: auto; }
    .panel-close {
      position: absolute;
      top: 18px;
      right: 18px;
      width: 38px;
      height: 38px;
      border-radius: 50%;
      border: 1px solid var(--line);
      background: rgba(255,255,255,.05);
      color: var(--ink);
      font-size: 1rem;
      cursor: pointer;
    }

    .panel .category {
      margin: 20px 0 14px;
      font-size: .72rem;
      letter-spacing: .16em;
      text-transform: uppercase;
      color: var(--panel-accent, var(--blue));
    }

    .panel h2 {
      margin: 0;
      font-size: clamp(1.8rem, 4.5vw, 3rem);
      line-height: .96;
      letter-spacing: -.045em;
      font-weight: 560;
    }

    .panel .definition {
      margin: 22px 0 0;
      color: #edf1f8;
      font-size: 1.08rem;
      line-height: 1.72;
    }

    .why {
      margin-top: 26px;
      padding-top: 24px;
      border-top: 1px solid var(--line);
    }

    .why h3 {
      margin: 0 0 10px;
      font-size: .75rem;
      color: var(--muted);
      letter-spacing: .14em;
      text-transform: uppercase;
    }

    .why p {
      margin: 0;
      color: #d4dcea;
      line-height: 1.65;
    }

    .explore-btn {
      width: 100%;
      margin-top: 28px;
      padding: 15px 18px;
      border: 1px solid rgba(255,255,255,.16);
      border-radius: 14px;
      color: #07101b;
      background: linear-gradient(180deg, #f7f9fd, #dce5f4);
      font-weight: 700;
      letter-spacing: .01em;
      cursor: pointer;
      transition: transform .2s ease, box-shadow .2s ease;
    }

    .explore-btn:hover { transform: translateY(-1px); box-shadow: 0 10px 30px rgba(199,215,245,.18); }
    .explore-btn.done { color: #2c220d; background: linear-gradient(180deg, #ffe8ac, #f4c96f); }

    .star-bloom {
      position: fixed;
      z-index: 9;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      pointer-events: none;
      background: #fff4c9;
      box-shadow: 0 0 18px rgba(255,225,150,.95);
      animation: bloom-flight 1.15s cubic-bezier(.12,.72,.3,1) forwards;
    }

    .constellation-star.just-explored {
      animation: newly-lit 1.35s ease-out both;
    }

    @keyframes bloom-flight {
      0% { transform: translate(-50%, -50%) rotate(var(--angle)) translateX(0) scale(.25); opacity: 0; }
      15% { opacity: 1; }
      100% { transform: translate(-50%, -50%) rotate(var(--angle)) translateX(var(--distance)) scale(0); opacity: 0; }
    }

    @keyframes newly-lit {
      0% { transform: translate(-50%, -50%) scale(1); }
      35% { transform: translate(-50%, -50%) scale(2.15); box-shadow: 0 0 18px #fff, 0 0 52px rgba(255,219,135,.95), 0 0 105px rgba(255,187,75,.4); }
      100% { transform: translate(-50%, -50%) scale(1); }
    }

    .shooting-star {
      position: absolute;
      width: 90px;
      height: 2px;
      border-radius: 999px;
      background: linear-gradient(90deg, rgba(255,255,255,0), rgba(255,255,255,.95));
      filter: drop-shadow(0 0 8px rgba(171,207,255,.75));
      transform: rotate(-30deg);
      animation: shoot 1.35s ease-in forwards;
      pointer-events: auto;
      cursor: pointer;
    }

    .toast {
      position: fixed;
      left: 50%;
      top: 50%;
      z-index: 20;
      transform: translate(-50%, -40%) scale(.96);
      max-width: min(360px, calc(100vw - 42px));
      padding: 22px 26px;
      border: 1px solid var(--line);
      border-radius: 20px;
      background: rgba(8,13,23,.86);
      backdrop-filter: blur(18px);
      color: var(--ink);
      text-align: center;
      box-shadow: 0 24px 90px rgba(0,0,0,.48);
      opacity: 0;
      pointer-events: none;
      transition: opacity .3s ease, transform .3s ease;
    }

    .toast.show { opacity: 1; transform: translate(-50%, -50%) scale(1); pointer-events: auto; cursor: pointer; }
    .toast strong { display: block; font-size: 1.1rem; margin-bottom: 6px; }
    .toast span { color: var(--muted); font-size: .9rem; }

    .secret-star {
      position: fixed;
      right: 22%;
      top: 18%;
      z-index: 6;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      opacity: 0;
      pointer-events: none;
      background: #fff;
      box-shadow: 0 0 12px #fff, 0 0 32px rgba(142,190,255,.9), 0 0 80px rgba(142,190,255,.42);
      transition: opacity .4s ease;
    }

    .secret-star.visible { opacity: 1; animation: secret-pulse 1s ease-in-out 3; }

    .muse-pulse .constellation-star { animation: muse-pulse .75s ease-in-out 4; }

    @keyframes star-breathe {
      0%, 100% { opacity: .82; }
      50% { opacity: 1; }
    }

    @keyframes shoot {
      0% { transform: translate(0,0) rotate(-30deg); opacity: 0; }
      12% { opacity: 1; }
      100% { transform: translate(-360px, 220px) rotate(-30deg); opacity: 0; }
    }

    @keyframes secret-pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(2.2); }
    }

    @keyframes muse-pulse {
      0%, 100% { transform: translate(-50%, -50%) scale(1); }
      50% { transform: translate(-50%, -50%) scale(1.9); box-shadow: 0 0 16px #fff, 0 0 52px rgba(182,120,255,.95), 0 0 110px rgba(81,144,255,.45); }
    }



    .sound-toggle {
      position: fixed;
      top: 26px;
      right: 28px;
      z-index: 7;
      display: inline-flex;
      align-items: center;
      gap: 9px;
      padding: 10px 13px;
      border: 1px solid var(--line);
      border-radius: 999px;
      color: var(--muted);
      background: rgba(8, 13, 23, .5);
      backdrop-filter: blur(14px);
      font: inherit;
      font-size: .78rem;
      cursor: pointer;
      transition: color .2s ease, background .2s ease, transform .2s ease;
    }

    .sound-toggle:hover { color: var(--ink); transform: translateY(-1px); }
    .sound-toggle[aria-pressed="true"] { color: #e8f4ff; background: rgba(92, 123, 164, .22); }
    .sound-toggle .sound-icon { font-size: .95rem; }

    .completion {
      position: fixed;
      inset: 0;
      z-index: 18;
      display: grid;
      place-items: center;
      pointer-events: none;
      opacity: 0;
      overflow: hidden;
      transition: opacity .8s ease;
    }

    .completion.show { opacity: 1; }
    .completion::before {
      content: "";
      position: absolute;
      inset: -20%;
      background:
        radial-gradient(circle at 50% 50%, rgba(255, 224, 160, .18), transparent 18%),
        conic-gradient(from 0deg, transparent, rgba(155,199,255,.16), transparent 26%, rgba(200,182,255,.14), transparent 55%, rgba(169,240,209,.12), transparent 78%);
      filter: blur(24px);
      animation: completion-turn 8s linear infinite;
    }

    .completion-ring {
      position: absolute;
      width: 110px;
      height: 110px;
      border: 1px solid rgba(255, 226, 172, .65);
      border-radius: 50%;
      box-shadow: 0 0 35px rgba(255, 218, 138, .3), inset 0 0 35px rgba(255, 218, 138, .16);
      animation: completion-ring 2.8s ease-out forwards;
    }

    .completion-message {
      position: relative;
      text-align: center;
      text-shadow: 0 3px 24px rgba(0,0,0,.55);
      animation: completion-message 3.4s ease both;
    }

    .completion-message strong {
      display: block;
      font-size: clamp(1.7rem, 5vw, 3.4rem);
      font-weight: 560;
      letter-spacing: -.035em;
    }

    .completion-message span {
      display: block;
      margin-top: 10px;
      color: #d7dfec;
      font-size: .95rem;
      letter-spacing: .04em;
    }

    .completion-spark {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: #fff4ce;
      box-shadow: 0 0 12px rgba(255,235,180,.95);
      animation: completion-spark 2.5s ease-out forwards;
    }


    .completion-dust {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 2px;
      height: 2px;
      border-radius: 50%;
      background: #fff;
      box-shadow: 0 0 9px rgba(210,230,255,.9);
      animation: completion-dust 3.1s ease-out forwards;
    }

    @keyframes completion-turn { to { transform: rotate(360deg); } }
    @keyframes completion-ring {
      0% { transform: scale(.3); opacity: 0; }
      18% { opacity: 1; }
      100% { transform: scale(7); opacity: 0; }
    }
    @keyframes completion-message {
      0%, 12% { opacity: 0; transform: translateY(12px) scale(.97); }
      28%, 78% { opacity: 1; transform: translateY(0) scale(1); }
      100% { opacity: 0; transform: translateY(-8px) scale(1.02); }
    }
    @keyframes completion-dust {
      0% { transform: translate(-50%, -50%) rotate(var(--angle)) translateX(20px) scale(.2); opacity: 0; }
      20% { opacity: .95; }
      100% { transform: translate(-50%, -50%) rotate(var(--angle)) translateX(var(--distance)) scale(0); opacity: 0; }
    }

    @keyframes completion-spark {
      0% { transform: translate(-50%, -50%) rotate(var(--angle)) translateX(0) scale(.3); opacity: 0; }
      16% { opacity: 1; }
      100% { transform: translate(-50%, -50%) rotate(var(--angle)) translateX(var(--distance)) scale(0); opacity: 0; }
    }



    /* Celestial reading lens: text feels revealed by the sky, not placed on top of it. */
    .panel-backdrop {
      background: radial-gradient(circle at 50% 48%, rgba(110,136,190,.11), rgba(3,7,15,.22) 46%, rgba(3,7,15,.08) 72%);
      backdrop-filter: blur(2.5px) saturate(108%);
    }

    .panel {
      width: min(690px, calc(100vw - 44px));
      max-height: min(76svh, 680px);
      padding: 54px 58px 42px;
      border: 0;
      border-radius: 50% / 18%;
      background:
        radial-gradient(ellipse at center, color-mix(in srgb, var(--panel-accent, var(--blue)) 10%, rgba(12,20,36,.64)) 0%, rgba(9,15,28,.50) 48%, rgba(5,10,19,.18) 72%, transparent 100%);
      backdrop-filter: blur(10px) saturate(112%);
      box-shadow: none;
      overflow: visible;
      text-align: center;
    }

    .panel::before {
      content: "✦";
      top: 18px;
      font-size: .72rem;
      opacity: .9;
    }

    .panel::after {
      top: 2px;
      width: 100%;
      height: calc(100% - 4px);
      border: 1px solid color-mix(in srgb, var(--panel-accent, var(--blue)) 22%, transparent);
      border-left-color: transparent;
      border-right-color: transparent;
      border-radius: 50%;
      box-shadow: 0 0 44px color-mix(in srgb, var(--panel-accent, var(--blue)) 8%, transparent);
      transform: translateX(-50%);
    }

    .panel-close {
      top: 20px;
      right: 30px;
      width: 34px;
      height: 34px;
      border: 0;
      background: transparent;
      color: rgba(225,234,248,.62);
      font-family: Georgia, "Times New Roman", serif;
      font-size: 1.15rem;
      transition: color .2s ease, transform .2s ease;
    }
    .panel-close:hover { color: #fff; transform: rotate(8deg) scale(1.08); }

    .panel .category {
      margin: 0 0 14px;
      font-size: .63rem;
      letter-spacing: .31em;
      opacity: .82;
    }

    .panel h2 {
      max-width: 570px;
      margin: 0 auto;
      font-family: Georgia, "Times New Roman", serif;
      font-size: clamp(2rem, 5vw, 3.55rem);
      font-weight: 400;
      line-height: 1.02;
      letter-spacing: -.04em;
      text-shadow: 0 0 28px color-mix(in srgb, var(--panel-accent, var(--blue)) 20%, transparent);
    }

    .panel .definition {
      max-width: 580px;
      margin: 23px auto 0;
      color: rgba(239,244,252,.91);
      font-family: Georgia, "Times New Roman", serif;
      font-size: 1.05rem;
      line-height: 1.78;
    }

    .why {
      position: relative;
      max-width: 540px;
      margin: 27px auto 0;
      padding: 25px 24px 0;
      border-top: 0;
    }
    .why::before {
      content: "";
      position: absolute;
      left: 50%; top: 0;
      width: 86px; height: 1px;
      transform: translateX(-50%);
      background: linear-gradient(90deg, transparent, var(--panel-accent, var(--blue)), transparent);
      opacity: .55;
    }
    .why h3 {
      margin: 0 0 11px;
      color: color-mix(in srgb, var(--panel-accent, var(--blue)) 78%, white);
      font-size: .61rem;
      letter-spacing: .28em;
    }
    .why p {
      color: rgba(211,222,240,.84);
      font-family: Georgia, "Times New Roman", serif;
      font-size: .94rem;
      font-style: italic;
      line-height: 1.7;
    }

    .explore-btn {
      width: auto;
      min-width: 210px;
      margin-top: 30px;
      padding: 12px 22px 13px;
      border: 1px solid color-mix(in srgb, var(--panel-accent, var(--blue)) 34%, rgba(255,255,255,.15));
      border-radius: 999px;
      color: rgba(241,246,255,.92);
      background: color-mix(in srgb, var(--panel-accent, var(--blue)) 12%, rgba(6,11,21,.52));
      font-family: Georgia, "Times New Roman", serif;
      font-size: .9rem;
      font-weight: 400;
      font-style: italic;
      letter-spacing: .025em;
      box-shadow: 0 0 24px color-mix(in srgb, var(--panel-accent, var(--blue)) 8%, transparent);
    }
    .explore-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 0 34px color-mix(in srgb, var(--panel-accent, var(--blue)) 18%, transparent);
    }
    .explore-btn.done {
      color: rgba(255,244,213,.94);
      background: rgba(124,93,38,.18);
      border-color: rgba(255,217,138,.36);
    }

    @media (max-width: 760px) {
      .brand { top: 22px; left: 22px; max-width: 270px; }
      .brand p { font-size: .86rem; }
      .progress-card { left: 18px; bottom: 18px; }
      .panel { left: 50%; top: 50%; right: auto; bottom: auto; width: calc(100vw - 24px); max-height: 82svh; padding: 48px 26px 32px; border-radius: 42% / 12%; transform: translate(-50%, -46%) scale(.97); overflow-y: auto; }
      .panel.open { transform: translate(-50%, -50%) scale(1); }
      .constellation-star .label { display: none; }
      .sound-toggle { top: auto; right: 18px; bottom: 18px; padding: 10px; }
      .sound-toggle .sound-label { display: none; }
    }



    /* Phone composition: preserve the night-sky feeling while making every star easy to reach. */
    @media (max-width: 760px) {
      .brand {
        top: 18px;
        left: 18px;
        max-width: calc(100vw - 92px);
      }

      .brand .eyebrow {
        margin-bottom: 7px;
        font-size: .55rem;
        letter-spacing: .22em;
      }

      .brand h1 {
        font-size: clamp(2rem, 11vw, 3rem);
        line-height: .88;
      }

      .brand p {
        margin-top: 11px;
        font-size: .78rem;
      }

      .sound-toggle {
        top: 18px;
        right: 16px;
        bottom: auto;
        width: 42px;
        height: 42px;
        justify-content: center;
        padding: 0;
      }

      .progress-card {
        left: 50%;
        bottom: 12px;
        width: auto;
        min-width: 178px;
        padding: 9px 14px 10px;
        transform: translateX(-50%);
        border-radius: 999px;
        text-align: center;
        background: rgba(8, 13, 23, .38);
        backdrop-filter: blur(12px);
      }

      .progress-card small,
      .progress-row strong {
        display: none;
      }

      .progress-row {
        display: block;
      }

      .progress-row span {
        color: rgba(224,232,246,.86);
        font-family: Georgia, "Times New Roman", serif;
        font-size: .78rem;
        font-style: italic;
      }

      .progress-row span::before {
        content: "✦ ";
        color: var(--gold);
      }

      .reset-btn {
        margin-top: 3px;
        font-size: .61rem;
        opacity: .72;
      }

      /* The button is finger-sized; only its luminous center is visually small. */
      .constellation-star {
        width: 46px;
        height: 46px;
        background:
          radial-gradient(circle at center,
            #f7fbff 0 calc(var(--size) * .48),
            rgba(247,251,255,.92) calc(var(--size) * .49),
            transparent calc(var(--size) * .62));
        box-shadow: none;
        animation-name: mobile-star-breathe;
      }

      .constellation-star.explored {
        background:
          radial-gradient(circle at center,
            var(--gold) 0 calc(var(--size) * .48),
            rgba(255,217,138,.95) calc(var(--size) * .49),
            transparent calc(var(--size) * .65));
        box-shadow: none;
      }

      .constellation-star::before {
        width: calc(var(--size) * 3.8);
      }

      .constellation-star::after {
        height: calc(var(--size) * 3.8);
      }

      .constellation-star:hover,
      .constellation-star:focus-visible {
        transform: translate(-50%, -50%) scale(1.08);
        box-shadow: none;
      }

      /* A portrait constellation with clear sky above, below, and around the reading lens. */
      .constellation-star[data-id="prompt-chaining"] { left: 17% !important; top: 30% !important; }
      .constellation-star[data-id="raf"]             { left: 49% !important; top: 27% !important; }
      .constellation-star[data-id="local-storage"]   { left: 82% !important; top: 31% !important; }
      .constellation-star[data-id="context-windows"] { left: 30% !important; top: 40% !important; }
      .constellation-star[data-id="css-vars"]        { left: 68% !important; top: 40% !important; }
      .constellation-star[data-id="retrieval"]       { left: 12% !important; top: 51% !important; }
      .constellation-star[data-id="systems"]         { left: 50% !important; top: 50% !important; }
      .constellation-star[data-id="flexbox"]         { left: 87% !important; top: 51% !important; }
      .constellation-star[data-id="embeddings"]      { left: 27% !important; top: 62% !important; }
      .constellation-star[data-id="tradeoffs"]       { left: 71% !important; top: 62% !important; }
      .constellation-star[data-id="second-order"]    { left: 15% !important; top: 74% !important; }
      .constellation-star[data-id="decision-records"]{ left: 52% !important; top: 72% !important; }

      .panel-backdrop {
        background: radial-gradient(circle at 50% 49%, rgba(110,136,190,.10), rgba(3,7,15,.20) 52%, rgba(3,7,15,.06) 78%);
        backdrop-filter: blur(2px) saturate(106%);

      .panel {
        width: calc(100vw - 30px);

        padding: 42px 24px 28px;
        border-radius: 46% / 10%;
        background:
          radial-gradient(ellipse at center, color-mix(in srgb, var(--panel-accent, var(--blue)) 10%, rgba(12,20,36,.58)) 0%, rgba(9,15,28,.48) 52%, rgba(5,10,19,.15) 76%, transparent 100%);
        overflow-y: auto;
        overscroll-behavior: contain;
      }

      .panel::before { top: 13px; }
      .panel::after { opacity: .76; }

      .panel-close {
        top: 13px;
        right: 20px;
        width: 42px;
        height: 42px;
      }

      .panel .category {
        margin-bottom: 10px;
        font-size: .56rem;
      }

      .panel h2 {
        max-width: 92%;
        font-size: clamp(1.75rem, 8.5vw, 2.55rem);
      }

      .panel .definition {
        margin-top: 17px;
        font-size: .94rem;
        line-height: 1.58;
      }

      .why {
        margin-top: 20px;
        padding: 19px 8px 0;
      }

      .why h3 {
        margin-bottom: 8px;
        font-size: .55rem;
      }

      .why p {
        font-size: .86rem;
        line-height: 1.55;
      }

      .explore-btn {
        min-width: 190px;
        margin-top: 22px;
        padding: 12px 18px;
      }
    }

    @keyframes mobile-star-breathe {
      0%, 100% { opacity: .78; filter: drop-shadow(0 0 5px rgba(255,255,255,.72)) drop-shadow(0 0 14px var(--glow)); }
      50% { opacity: 1; filter: drop-shadow(0 0 8px rgba(255,255,255,.95)) drop-shadow(0 0 22px var(--glow)); }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation-duration: .01ms !important; animation-iteration-count: 1 !important; scroll-behavior: auto !important; }
    }
  </style>
</head>
<body>
  <canvas id="starfield" aria-hidden="true"></canvas>
  <div id="shooting-layer" aria-hidden="true"></div>
  <div id="constellation-layer" aria-label="Interactive learning constellation"></div>
  <div class="grain" aria-hidden="true"></div>

  <header class="brand">
    <p class="eyebrow">A quiet learning space</p>
    <h1>The<br>Observatory</h1>
    <p>A universe that grows as I do.</p>
  </header>

  <section class="progress-card" aria-live="polite">
    <small>Observatory</small>
    <div class="progress-row">
      <strong>Explored</strong>
      <span id="progress-text">0 / 12 stars</span>
    </div>
    <button class="reset-btn" id="reset-btn" type="button">Reset constellation</button>
  </section>

  <div class="panel-backdrop" id="panel-backdrop" aria-hidden="true"></div>

  <aside class="panel" id="panel" aria-hidden="true">
    <button class="panel-close" id="panel-close" aria-label="Close panel">×</button>
    <p class="category" id="panel-category"></p>
    <h2 id="panel-title"></h2>
    <p class="definition" id="panel-definition"></p>
    <section class="why">
      <h3>Why it matters here</h3>
      <p id="panel-why"></p>
    </section>
    <button class="explore-btn" id="explore-btn">Mark as explored</button>
  </aside>

  <div class="toast" id="toast" role="status" aria-live="polite">
    <strong id="toast-title"></strong>
    <span id="toast-copy"></span>
  </div>

  <button class="secret-star" id="secret-star" aria-label="A tiny secret star"></button>

  <button class="sound-toggle" id="sound-toggle" type="button" aria-pressed="false" aria-label="Turn ambient sounds on">
    <span class="sound-icon" aria-hidden="true">♩</span>
    <span class="sound-label">Sound off</span>
  </button>

  <div class="completion" id="completion" aria-hidden="true">
    <div class="completion-ring"></div>
    <div class="completion-message">
      <strong>The sky remembers.</strong>
      <span>Every star is warm now.</span>
    </div>
  </div>


  <script>
    const concepts = [
      { id: 'raf', x: 67, y: 18, size: 15, category: 'Web', accent: '#9bc7ff', title: 'requestAnimationFrame', definition: 'A browser method that schedules visual updates to happen in step with the screen refresh, helping animations feel smooth and efficient.', why: 'You will use this whenever we make interfaces feel alive instead of mechanical.' },
      { id: 'local-storage', x: 79, y: 35, size: 13, category: 'Web', accent: '#9bc7ff', title: 'Local Storage', definition: 'A small browser-based key-value store that lets a page remember simple information after it closes.', why: 'It is how this observatory remembers which stars you have explored without needing a database.' },
      { id: 'css-vars', x: 60, y: 46, size: 12, category: 'Web', accent: '#9bc7ff', title: 'CSS Variables', definition: 'Reusable named values in CSS that make a design system easier to change, maintain, and keep consistent.', why: 'They let us restyle an entire project from a few deliberate design decisions.' },
      { id: 'flexbox', x: 72, y: 62, size: 14, category: 'Web', accent: '#9bc7ff', title: 'Flexbox', definition: 'A layout model for arranging items in rows or columns while controlling alignment, spacing, and responsive behavior.', why: 'It removes a lot of low-value layout fuss when you are translating structure into an interface.' },

      { id: 'prompt-chaining', x: 37, y: 19, size: 14, category: 'AI', accent: '#c8b6ff', title: 'Prompt Chaining', definition: 'Breaking a complex task into smaller AI steps, where each result becomes useful context for the next.', why: 'It turns AI collaboration from one giant request into a controlled workflow you can inspect and steer.' },
      { id: 'context-windows', x: 24, y: 34, size: 12, category: 'AI', accent: '#c8b6ff', title: 'Context Windows', definition: 'The amount of information an AI model can actively consider during a single interaction.', why: 'Understanding this helps you decide what to repeat, summarize, retrieve, or leave out.' },
      { id: 'retrieval', x: 42, y: 47, size: 13, category: 'AI', accent: '#c8b6ff', title: 'Reasoning vs Retrieval', definition: 'Reasoning works with what is already present; retrieval brings in missing evidence, documents, or current facts.', why: 'It helps you notice whether a problem needs better thinking or simply better source material.' },
      { id: 'embeddings', x: 29, y: 64, size: 11, category: 'AI', accent: '#c8b6ff', title: 'Embeddings', definition: 'Numeric representations that place meaningfully similar information near each other in a mathematical space.', why: 'They power semantic search, recommendations, and many useful document-navigation tools.' },

      { id: 'systems', x: 49, y: 69, size: 15, category: 'Leadership', accent: '#a9f0d1', title: 'Systems Thinking', definition: 'Looking at relationships, incentives, feedback, constraints, and patterns rather than treating events as isolated.', why: 'This is already one of your strongest instincts, and naming it helps you use it intentionally.' },
      { id: 'tradeoffs', x: 57, y: 82, size: 12, category: 'Leadership', accent: '#a9f0d1', title: 'Tradeoffs', definition: 'The reality that choosing one benefit often means accepting a cost, constraint, or reduced emphasis elsewhere.', why: 'Good strategy becomes clearer when hidden sacrifices are made explicit.' },
      { id: 'decision-records', x: 42, y: 84, size: 11, category: 'Leadership', accent: '#a9f0d1', title: 'Decision Records', definition: 'Short notes that capture what was decided, why, what alternatives were considered, and what may trigger reconsideration.', why: 'They preserve institutional memory without creating another giant documentation burden.' },
      { id: 'second-order', x: 19, y: 78, size: 13, category: 'Leadership', accent: '#a9f0d1', title: 'Second-order Thinking', definition: 'Looking beyond the immediate effect of a choice to consider what happens next, and what follows after that.', why: 'It helps you anticipate how policies, incentives, and tools reshape behavior over time.' }
    ];

    const canvas = document.getElementById('starfield');
    const ctx = canvas.getContext('2d');
    const layer = document.getElementById('constellation-layer');
    const panel = document.getElementById('panel');
    const panelBackdrop = document.getElementById('panel-backdrop');
    const panelClose = document.getElementById('panel-close');
    const resetBtn = document.getElementById('reset-btn');
    const exploreBtn = document.getElementById('explore-btn');
    const progressText = document.getElementById('progress-text');
    const toast = document.getElementById('toast');
    const toastTitle = document.getElementById('toast-title');
    const toastCopy = document.getElementById('toast-copy');
    const secretStar = document.getElementById('secret-star');
    const shootingLayer = document.getElementById('shooting-layer');
    const soundToggle = document.getElementById('sound-toggle');
    const completion = document.getElementById('completion');

    let width = 0;
    let height = 0;
    let stars = [];
    let activeId = null;
    let explored = new Set(JSON.parse(localStorage.getItem('observatory-explored-v4') || '[]'));
    let soundOn = localStorage.getItem('observatory-sound') === 'on';
    let audioContext = null;

    function resize() {
      const ratio = Math.min(window.devicePixelRatio || 1, 2);
      width = window.innerWidth;
      height = window.innerHeight;
      canvas.width = width * ratio;
      canvas.height = height * ratio;
      canvas.style.width = width + 'px';
      canvas.style.height = height + 'px';
      ctx.setTransform(ratio, 0, 0, ratio, 0, 0);
      createBackgroundStars();
    }

    function createBackgroundStars() {
      const count = Math.max(150, Math.floor((width * height) / 5500));
      stars = Array.from({ length: count }, () => ({
        x: Math.random() * width,
        y: Math.random() * height,
        r: Math.random() * 1.35 + .15,
        a: Math.random() * .65 + .18,
        twinkle: Math.random() * .02 + .004,
        phase: Math.random() * Math.PI * 2,
        drift: (Math.random() - .5) * .035
      }));
    }

    function drawBackground(time) {
      ctx.clearRect(0, 0, width, height);
      for (const star of stars) {
        star.x += star.drift;
        if (star.x < -5) star.x = width + 5;
        if (star.x > width + 5) star.x = -5;
        const alpha = Math.max(.08, star.a + Math.sin(time * star.twinkle + star.phase) * .22);
        ctx.beginPath();
        ctx.fillStyle = `rgba(238, 245, 255, ${alpha})`;
        ctx.arc(star.x, star.y, star.r, 0, Math.PI * 2);
        ctx.fill();
      }
      requestAnimationFrame(drawBackground);
    }

    function renderConcepts() {
      layer.innerHTML = '';
      for (const concept of concepts) {
        const button = document.createElement('button');
        button.className = 'constellation-star' + (explored.has(concept.id) ? ' explored' : '');
        button.style.left = concept.x + '%';
        button.style.top = concept.y + '%';
        button.style.setProperty('--size', concept.size + 'px');
        button.style.setProperty('--glow', concept.accent + 'aa');
        button.style.animationDelay = `${Math.random() * 2.5}s`;
        button.setAttribute('aria-label', concept.title);
        button.dataset.id = concept.id;
        button.innerHTML = `<span class="label">${concept.title}</span>`;
        button.addEventListener('click', () => openConcept(concept.id));
        layer.appendChild(button);
      }
      updateProgress();
    }

    function openConcept(id) {
      const concept = concepts.find(item => item.id === id);
      activeId = id;
      document.getElementById('panel-category').textContent = concept.category;
      document.getElementById('panel-title').textContent = concept.title;
      document.getElementById('panel-definition').textContent = concept.definition;
      document.getElementById('panel-why').textContent = concept.why;
      panel.style.setProperty('--panel-accent', concept.accent);
      updateExploreButton();
      panel.classList.add('open');
      panelBackdrop.classList.add('open');
      panelBackdrop.setAttribute('aria-hidden', 'false');
      playChime('open');
      panel.setAttribute('aria-hidden', 'false');
    }

    function closePanel() {
      panel.classList.remove('open');
      panelBackdrop.classList.remove('open');
      panelBackdrop.setAttribute('aria-hidden', 'true');
      panel.setAttribute('aria-hidden', 'true');
      activeId = null;
    }

    function updateExploreButton() {
      const isDone = explored.has(activeId);
      exploreBtn.textContent = isDone ? 'Return to the sky ✦' : 'Let this star glow';
      exploreBtn.classList.toggle('done', isDone);
    }

    function toggleExplored() {
      if (!activeId) return;

      // When revisiting an explored star, the button simply closes the observation.
      if (explored.has(activeId)) {
        closePanel();
        return;
      }

      const completedId = activeId;
      const wasComplete = explored.size === concepts.length;
      explored.add(completedId);
      localStorage.setItem('observatory-explored-v4', JSON.stringify([...explored]));
      renderConcepts();
      closePanel();
      playChime('explore');

      // Let the card clear before the star blooms, so the light is fully visible.
      setTimeout(() => bloomStar(completedId), 90);
      if (!wasComplete && explored.size === concepts.length) {
        setTimeout(runCompletion, 650);
      }
    }

    function bloomStar(id) {
      const concept = concepts.find(item => item.id === id);
      const star = layer.querySelector(`[data-id="${id}"]`);
      if (!concept || !star) return;
      star.classList.add('just-explored');
      const rect = star.getBoundingClientRect();
      const x = rect.left + rect.width / 2;
      const y = rect.top + rect.height / 2;
      for (let i = 0; i < 14; i++) {
        const spark = document.createElement('i');
        spark.className = 'star-bloom';
        spark.style.left = `${x}px`;
        spark.style.top = `${y}px`;
        spark.style.setProperty('--angle', `${(360 / 14) * i + Math.random() * 12}deg`);
        spark.style.setProperty('--distance', `${34 + Math.random() * 58}px`);
        spark.style.animationDelay = `${Math.random() * .12}s`;
        document.body.appendChild(spark);
        setTimeout(() => spark.remove(), 1400);
      }
      setTimeout(() => star.classList.remove('just-explored'), 1400);
    }

    function updateProgress() {
      progressText.textContent = `${explored.size} / ${concepts.length} stars`;
    }

    let resetConfirmTimer = null;
    function resetConstellation() {
      if (!resetBtn.classList.contains('confirm')) {
        resetBtn.classList.add('confirm');
        resetBtn.textContent = 'Click again to reset all stars';
        clearTimeout(resetConfirmTimer);
        resetConfirmTimer = setTimeout(() => {
          resetBtn.classList.remove('confirm');
          resetBtn.textContent = 'Reset constellation';
        }, 2600);
        return;
      }

      clearTimeout(resetConfirmTimer);
      explored = new Set();
      localStorage.removeItem('observatory-explored-v4');
      closePanel();
      renderConcepts();
      resetBtn.classList.remove('confirm');
      resetBtn.textContent = 'Reset constellation';
      document.body.classList.add('muse-pulse');
      setTimeout(() => document.body.classList.remove('muse-pulse'), 900);
    }

    function hideToast() {
      clearTimeout(showToast.timer);
      toast.classList.remove('show');
    }

    function showToast(title, copy, duration = 1800) {
      toastTitle.textContent = title;
      toastCopy.textContent = copy;
      toast.classList.add('show');
      clearTimeout(showToast.timer);
      showToast.timer = setTimeout(hideToast, duration);
    }



    function updateSoundToggle() {
      soundToggle.setAttribute('aria-pressed', String(soundOn));
      soundToggle.setAttribute('aria-label', soundOn ? 'Turn ambient sounds off' : 'Turn ambient sounds on');
      soundToggle.querySelector('.sound-icon').textContent = soundOn ? '♪' : '♩';
      soundToggle.querySelector('.sound-label').textContent = soundOn ? 'Sound on' : 'Sound off';
    }

    function ensureAudio() {
      if (!audioContext) audioContext = new (window.AudioContext || window.webkitAudioContext)();
      if (audioContext.state === 'suspended') audioContext.resume();
      return audioContext;
    }

    function tone(frequency, start, duration, gain = .025, type = 'sine') {
      if (!soundOn) return;
      const ac = ensureAudio();
      const osc = ac.createOscillator();
      const amp = ac.createGain();
      osc.type = type;
      osc.frequency.setValueAtTime(frequency, start);
      amp.gain.setValueAtTime(0.0001, start);
      amp.gain.exponentialRampToValueAtTime(gain, start + .035);
      amp.gain.exponentialRampToValueAtTime(0.0001, start + duration);
      osc.connect(amp).connect(ac.destination);
      osc.start(start);
      osc.stop(start + duration + .03);
    }

    function playChime(kind = 'open') {
      if (!soundOn) return;
      const ac = ensureAudio();
      const now = ac.currentTime + .01;
      if (kind === 'open') {
        tone(523.25, now, .42, .018);
        tone(783.99, now + .07, .5, .012);
      } else if (kind === 'explore') {
        tone(659.25, now, .5, .022);
        tone(987.77, now + .1, .62, .015);
        tone(1318.51, now + .2, .72, .01);
      } else if (kind === 'complete') {
        [523.25, 659.25, 783.99, 1046.5].forEach((f, i) => tone(f, now + i * .16, 1.15, .018 - i * .002));
        tone(1567.98, now + .7, 1.4, .008);
      }
    }

    function runCompletion() {
      completion.querySelectorAll('.completion-spark, .completion-dust').forEach(node => node.remove());
      for (let i = 0; i < 42; i++) {
        const spark = document.createElement('i');
        spark.className = 'completion-spark';
        spark.style.setProperty('--angle', `${(360 / 42) * i + Math.random() * 10}deg`);
        spark.style.setProperty('--distance', `${125 + Math.random() * 300}px`);
        spark.style.animationDelay = `${Math.random() * .5}s`;
        completion.appendChild(spark);
      }
      for (let i = 0; i < 54; i++) {
        const dust = document.createElement('i');
        dust.className = 'completion-dust';
        dust.style.setProperty('--angle', `${Math.random() * 360}deg`);
        dust.style.setProperty('--distance', `${90 + Math.random() * 420}px`);
        dust.style.animationDelay = `${.25 + Math.random() * .8}s`;
        completion.appendChild(dust);
      }
      document.body.classList.add('muse-pulse');
      setTimeout(() => document.body.classList.remove('muse-pulse'), 3000);
      completion.classList.add('show');
      completion.setAttribute('aria-hidden', 'false');
      playChime('complete');
      setTimeout(() => {
        completion.classList.remove('show');
        completion.setAttribute('aria-hidden', 'true');
      }, 3900);
    }

    function launchShootingStar(clickable = false) {
      const star = document.createElement('div');
      star.className = 'shooting-star';
      star.style.left = `${70 + Math.random() * 25}%`;
      star.style.top = `${3 + Math.random() * 22}%`;
      if (clickable) {
        star.setAttribute('aria-label', 'A shooting star');
        star.addEventListener('click', () => showToast('You noticed.', "Most people don't."));
      } else {
        star.style.pointerEvents = 'none';
      }
      shootingLayer.appendChild(star);
      setTimeout(() => star.remove(), 1500);
    }

    panelClose.addEventListener('click', closePanel);
    panelBackdrop.addEventListener('click', closePanel);
    resetBtn.addEventListener('click', resetConstellation);
    toast.addEventListener('click', hideToast);
    soundToggle.addEventListener('click', () => {
      soundOn = !soundOn;
      localStorage.setItem('observatory-sound', soundOn ? 'on' : 'off');
      updateSoundToggle();
      if (soundOn) { ensureAudio(); playChime('open'); }
    });
    exploreBtn.addEventListener('click', toggleExplored);
    window.addEventListener('keydown', event => {
      if (event.key === 'Escape') closePanel();
    });

    let typed = '';
    window.addEventListener('keydown', event => {
      if (event.key.length !== 1) return;
      typed = (typed + event.key.toUpperCase()).slice(-8);
      if (typed.endsWith('MUSE')) {
        document.body.classList.add('muse-pulse');
        showToast('MUSE signal received.', 'The sky approves.');
        setTimeout(() => document.body.classList.remove('muse-pulse'), 3400);
      }
      if (typed.endsWith('CARI')) {
        secretStar.classList.add('visible');
        showToast('Hi. 💙', 'One little star was waiting for you.');
        setTimeout(() => secretStar.classList.remove('visible'), 4000);
      }
    });

    secretStar.addEventListener('click', () => showToast('Hi. 💙', 'Still here.'));
    window.addEventListener('resize', resize);

    resize();
    renderConcepts();
    updateSoundToggle();
    requestAnimationFrame(drawBackground);

    setTimeout(() => launchShootingStar(true), 120000);
    setInterval(() => launchShootingStar(false), 55000 + Math.random() * 35000);
  </script>
</body>
</html>
