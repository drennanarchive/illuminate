    .links a {

      color: #0f62fe;
      padding: 14px 18px;
      border: 1px solid #d8dee9;
      border-radius: 10px;
      transition: 0.2s;
    }

    .links a:hover {
      background: #f3f7ff;
      border-color: #0f62fe;

    footer {

      color: #888;

    }
