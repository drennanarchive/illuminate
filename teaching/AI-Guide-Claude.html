document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    // Nested page bundles (iframe targets). Each ships ONCE, in the ROOT
    // document's manifest; frame srcs carry an about:blank#<uuid> marker
    // instead of a substitutable uuid. Every document mints the blobs for
    // its OWN frames — from local text at the root, or text obtained from
    // its DIRECT parent over the relay protocol below — so each frame
    // navigation stays same-origin with its initiator and a deduped page
    // loads at any depth on any host, including a file:// download's
    // opaque origins (where a blob minted by one document cannot be
    // navigated to by another).
    const pageOrderEl = document.querySelector('script[type="__bundler/page_order"]');
    const pageOrder = pageOrderEl ? JSON.parse(pageOrderEl.textContent) : [];
    const pageSet = new Set(pageOrder);
    const pageTexts = {};

    // ── Nested-page text protocol (parent-chain relay) ──
    // Page bundles ship once, in the ROOT document's manifest. Every
    // document mints the blobs for its OWN frames, obtaining page text
    // through a strict parent-chain relay: a document only ever SENDS to
    // its direct parent (which, for every document the publisher's own
    // runtime minted, is another publisher document) and only ACCEPTS
    // text from that direct parent; requests from below are honored only
    // for the document's own child frames, and the ROOT never sends
    // upward at all. That last rule is load-bearing: the artifact host's
    // frame-ancestors allows claude.ai (and friends) to frame an
    // artifact, so window.top can be a FOREIGN document — a top-addressed
    // protocol would hand page uuids to that ancestor and accept forged
    // "page text" from it, minting attacker HTML as an artifact-origin
    // blob document. The chain never touches the ancestor: requests stop
    // at the root, replies are origin-addressed per hop (never '*' when
    // an origin exists), and both directions are origin-gated (on https
    // a foreign sender's origin can never equal this document's; in
    // opaque contexts — file:// — everything serializes as 'null', where
    // an embedded EXTERNAL frame still fails the gate by carrying its
    // own real origin, and a sandboxed child of such a frame is excluded
    // by the own-child-frames check plus uuid unguessability). Shape is
    // deny-by-default: one request form, one reply form, no error
    // replies.
    // window.origin is the SERIALIZED SECURITY origin ('null' in opaque
    // contexts such as a sandboxed preview iframe) — location.origin is
    // computed from the URL and stays 'https://…' even when the document
    // is sandboxed, which would misgate every opaque chain.
    const OWN_TARGET = /^https?:[/][/]/.test(window.origin || '')
      ? window.origin
      : '*';
    function trustedOrigin(e) {
      if (e.origin === window.origin) return true; // https chains; opaque==opaque
      // file:// trees: Chrome serializes the file document's origin as
      // 'file://' while the blob: documents it mints serialize as 'null',
      // so the two legitimate shapes can never string-match — accept the
      // pair in both directions. https origins never serialize as either,
      // and sender identity (own child frame / direct parent) is checked
      // separately.
      return (
        (e.origin === 'null' &&
          (window.origin === 'file://' ||
            window.location.protocol === 'file:')) ||
        (/^file:/.test(e.origin) && window.origin === 'null')
      );
    }
    // Non-empty only in the root document (nested bundles ship an empty
    // island), so it doubles as the root marker: the root answers from
    // local text and treats a miss as authoritative — never relaying to
    // its (possibly foreign) parent.
    const isPageRoot = pageOrder.length > 0;
    const blobUrls = {};
    const resourceBlobs = {};
    const UUID_SHAPE = /^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/;
    const pendingFrames = {}; // uuid -> [{el, frag}] awaiting text for own frames
    const pendingRelays = {}; // uuid -> [childWindow] awaiting text to pass down
    function mountPage(el, frag, text) {
      const pageBlob = new Blob([text], { type: 'text/html' });
      const u = URL.createObjectURL(pageBlob);
      resourceBlobs[u] = pageBlob;
      el.src = u + frag;
    }
    function deliverPage(uuid, text) {
      const frames = pendingFrames[uuid];
      delete pendingFrames[uuid];
      if (frames) for (const f of frames) mountPage(f.el, f.frag, text);
      const relays = pendingRelays[uuid];
      delete pendingRelays[uuid];
      if (relays) {
        for (const cw of relays) {
          try { cw.postMessage({ __bundler_page: uuid, __bundler_text: text }, OWN_TARGET); } catch (err) { /* gone */ }
        }
      }
    }
    function ownFrameWindows() {
      const out = [];
      for (const f of Array.from(document.querySelectorAll('iframe'))) {
        try { if (f.contentWindow) out.push(f.contentWindow); } catch (err) { /* detached */ }
      }
      return out;
    }
    window.addEventListener('message', function (e) {
      const d = e.data;
      if (!d || typeof d !== 'object' || !e.source) return;
      // Origin gate first; the structural checks below (own-child-frames
      // for requests, direct-parent + solicited-uuid for replies, the
      // root's never-relay rule) are what hold in fully opaque chains
      // where origin strings can't discriminate — a sandboxed root's
      // FOREIGN wrapper still fails all three even though both serialize
      // as real-vs-'null' rather than matching.
      if (!trustedOrigin(e)) return;
      if (typeof d.__bundler_need === 'string' && UUID_SHAPE.test(d.__bundler_need)) {
        // Requests are honored only for this document's own child frames.
        if (ownFrameWindows().indexOf(e.source) < 0) return;
        const uuid = d.__bundler_need;
        const text = pageTexts[uuid];
        if (typeof text === 'string') {
          try { e.source.postMessage({ __bundler_page: uuid, __bundler_text: text }, OWN_TARGET); } catch (err) { /* gone */ }
          return;
        }
        if (isPageRoot || window.parent === window) return; // authoritative miss
        const waiting = pendingRelays[uuid];
        if (waiting) {
          if (waiting.indexOf(e.source) < 0) waiting.push(e.source);
          return;
        }
        // Never-answered uuids would otherwise accumulate forever under a
        // request spray; past the cap (far above any real page count) new
        // relays are dropped rather than remembered.
        if (Object.keys(pendingRelays).length >= 128) return;
        pendingRelays[uuid] = [e.source];
        window.parent.postMessage({ __bundler_need: uuid }, OWN_TARGET);
      } else if (
        typeof d.__bundler_page === 'string' &&
        UUID_SHAPE.test(d.__bundler_page) &&
        typeof d.__bundler_text === 'string'
      ) {
        // The shape test is load-bearing beyond tidiness: the solicited
        // check below uses the in operator, which matches prototype keys
        // ('__proto__', 'constructor') — an unshaped key would reach
        // deliverPage and throw, painting the error banner.
        // Text is accepted only from the direct parent — the document
        // that minted this one.
        if (e.source !== window.parent || window.parent === window) return;
        if (!(d.__bundler_page in pendingFrames) && !(d.__bundler_page in pendingRelays)) return;
        deliverPage(d.__bundler_page, d.__bundler_text);
      }
    });

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (pageSet.has(uuid)) {
          pageTexts[uuid] = new TextDecoder().decode(finalBytes);
          return;
        }
        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    // Page uuids have no blob here — they ride inside about:blank#<uuid>
    // frame markers the pass below resolves after the swap.
    for (const uuid of uuids) {
      if (pageSet.has(uuid)) continue;
      template = template.split(uuid).join(blobUrls[uuid]);
    }

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);

    // Resolve page-frame markers: mint this document's own blob for each
    // framed page — from local text when this is the root, otherwise by
    // asking the direct parent over the relay protocol above. An
    // unanswered request leaves the frame on about:blank, the same
    // degraded state as a refused embed.
    {
      const MARKER = /^about:blank#([0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12})(#.*)?$/;
      const needed = [];
      for (const el of Array.from(document.querySelectorAll('iframe'))) {
        const m = MARKER.exec(el.getAttribute('src') || '');
        if (!m) continue;
        const text = pageTexts[m[1]];
        if (typeof text === 'string') {
          mountPage(el, m[2] || '', text);
        } else if (window.parent !== window && !isPageRoot) {
          const had = pendingFrames[m[1]];
          (pendingFrames[m[1]] = had || []).push({ el: el, frag: m[2] || '' });
          if (!had) needed.push(m[1]);
        }
      }
      for (const uuid of needed) {
        window.parent.postMessage({ __bundler_need: uuid }, OWN_TARGET);
      }
    }

    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

 font-size: 23px; font-weight: 700; margin: 0 0 4px; color: #f6f2ea;\">What it's not<\u002Fh2>\n          <p style=\"color: #a39c90; font-size: 15px; margin: 0 0 20px;\">Tap each one, worth knowing before you rely on it.<\u002Fp>\n          <sc-for list=\"{{ whatNot }}\" as=\"item\" hint-placeholder-count=\"4\">\n            <div style=\"{{ item.boxStyle }}\">\n              <div sc-camel-on-click=\"{{ item.toggle }}\" style=\"display: flex; align-items: center; justify-content: space-between; padding: 18px 20px; cursor: pointer;\">\n                <div style=\"font-weight: 600; font-size: 15.5px; color: #f0ebe2;\"><span style=\"color: #f87171; margin-right: 8px;\">✕<\u002Fspan>{{ item.title }}<\u002Fdiv>\n                <span style=\"{{ item.chevronStyle }}\">▾<\u002Fspan>\n              <\u002Fdiv>\n              <div style=\"{{ item.panelStyle }}\">\n                <div style=\"overflow: hidden;\">\n                  <div style=\"{{ item.drawerStyle }}\"><div style=\"color: #c9c1b6; font-size: 15px;\">{{ item.reveal }}<\u002Fdiv><\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <sc-if value=\"{{ showTools }}\" hint-placeholder-val=\"{{ true }}\">\n      <div style=\"max-width: 760px; margin: 0 auto;\">\n        <h2 style=\"font-family: Poppins, sans-serif; font-size: 23px; font-weight: 700; margin: 0 0 4px; color: #f6f2ea;\">The tools<\u002Fh2>\n        <p style=\"color: #a39c90; font-size: 15px; margin: 0 0 20px;\">You don't need to know all of these, tap to peek at each one.<\u002Fp>\n        <sc-for list=\"{{ tools }}\" as=\"item\" hint-placeholder-count=\"5\">\n          <div style=\"{{ item.boxStyle }}\">\n            <div sc-camel-on-click=\"{{ item.toggle }}\" style=\"display: flex; align-items: center; gap: 12px; padding: 16px 20px; cursor: pointer;\">\n              <div style=\"{{ item.badgeStyle }}\">{{ item.letter } "4\">\n            <div style=\"{{ item.cardStyle }}\" style-hover=\"{{ item.hoverStyle }}\">\n              <div style=\"{{ item.badgeStyle }}\">{{ item.icon }}<\u002Fdiv>\n              <div style=\"font-family: Poppins, sans-serif; font-weight: 600; font-size: 16px; margin-bottom: 6px; color: #f0ebe2;\">{{ item.title }}<\u002Fdiv>\n              <div style=\"color: #a39c90; font-size: 14.5px;\">{{ item.text }}<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n\n        <div style=\"max-width: 760px; margin: 0 auto;\">\n          <h2 style=\"font-family: Poppins, sans-serif; font-size: 23px; font-weight: 700; margin: 0 0 4px; color: #f6f2ea;\">When AI wastes time<\u002Fh2>\n          <p style=\"color: #a39c90; font-size: 15px; margin: 0 0 20px;\">Skip it in these cases.<\u002Fp>\n          <sc-for list=\"{{ wastesTime }}\" as=\"item\" hint-placeholder-count=\"3\">\n            <div style=\"background: rgba(239,68,68,0.09); border: 1px solid rgba(239,68,68,0.3); border-radius: 14px; padding: 18px 20px; margin-bottom: 12px;\">\n              <div style=\"font-weight: 600; font-size: 15.5px; margin-bottom: 6px; color: #fca5a5;\">{{ item.title }}<\u002Fdiv>\n              <div style=\"color: #d9cfc4; font-size: 14.5px;\">{{ item.text }}<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n\n          <div style=\"background: rgba(245,158,11,0.14); border: 1px solid rgba(245,158,11,0.4); border-radius: 16px; padding: 20px 22px; margin-top: 24px;\">\n            <div style=\"font-weight: 700; font-size: 16px; color: #fbbf24; margin-bottom: 4px;\">💡 Reality check<\u002Fdiv>\n            <div style=\"color: #e8dcc4; font-size: 15px;\">AI saves time on tedium, not thinking. The thinking part is still yours.<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <sc-if value=\"{{ showHow }}\" hint-placeholder-val=\"{{ true }}\">\n      <div>\n        <div style=\"max-width: 760px; margin: 0 auto;\">\n          <h2 style=\"font-family: Poppins, sans-serif; font-size: 23px; font-weight: 700; margin: 0 0 4px; color: #f6f2ea;\">The 4-step workflow<\u002Fh2>\n          <p style=\"color: #a39c90; font-size: 15px; margin: 0 0 20px;\">Do these in order, every time.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 16px; margin-bottom: 40px;\">\n          <sc-for list=\"{{ workflow }}\" as=\"item\" hint-placeholder-count=\"4\">\n            <div style=\"{{ item.cardStyle }}\" style-hover=\"{{ item.hoverStyle }}\">\n              <div style=\"{{ item.badgeStyle }}\">{{ item.num }}<\u002Fdiv>\n              <div style=\"font-family: Poppins, sans-serif; font-weight: 600; font-size: 16px; margin-bottom: 6px; color: #f0ebe2;\">{{ item.title }}<\u002Fdiv>\n              <div style=\"color: #a39c90; font-size: 14.5px;\">{{ item.text }}<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n\n        <div style=\"max-width: 760px; margin: 0 auto;\">\n          <h2 style=\"font-family: Poppins, sans-serif; font-size: 23px; font-weight: 700; margin: 0 0 12px; color: #f6f2ea;\">Vague vs. specific<\u002Fh2>\n          <sc-for list=\"{{ comparisons }}\" as=\"pair\" hint-placeholder-count=\"3\">\n            <div style=\"margin-bottom: 22px;\">\n              <div style=\"font-size: 12.5px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; color: #a78bfa; margin-bottom: 8px;\">{{ pair.label }}<\u002Fdiv>\n              <div style=\"display: flex; gap: 12px; flex-wrap: wrap;\">\n                <div style=\"flex: 1; min-width: 240px; background: rgba(239,68,68,0.09); border: 1px solid rgba(239,68,68,0.3); border-radius: 14px; padding: 14px 16px;\">\n                  <div style=\"font-size: 12.5px; font-weight: 700; color: #fca5a5; margin-bottom: 6px;\">✕ VAGUE<\u002Fdiv>\n                  <div style=\"font-size: 14.5px; color: #d9cfc4;\">{{ pair.bad }}<\u002Fdiv>\n                <\u002Fdiv>\n                <div style=\"flex: 1; min-width: 240px; background: rgba(16,185,129,0.1); border: 1px solid rgba(16,185,129,0.35); border-radius: 14px; padding: 14px 16px;\">\n                  <div style=\"font-size: 12.5px; font-weight: 700; color: #6ee7b7; margin-bottom: 6px;\">✓ SPECIFIC<\u002Fdiv>\n                  <div style=\"font-size: 14.5px; color: #d9cfc4;\">{{ pair.good }}<\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n\n          <h2 style=\"font-family: Poppins, sans-serif; font-size: 23px; font-weight: 700; margin: 28px 0 4px; color: #f6f2ea;\">Advanced tips<\u002Fh2>\n          <p style=\"color: #a39c90; font-size: 15px; margin: 0 0 20px;\">Once the basics feel natural.<\u002Fp>\n          <sc-for list=\"{{ advancedTips }}\" as=\"item\" hint-placeholder-count=\"3\">\n            <div style=\"{{ item.boxStyle }}\">\n              <div sc-camel-on-click=\"{{ item.toggle }}\" style=\"display: flex; align-items: center; justify-content: space-between; padding: 18px 20px; cursor: pointer;\">\n                <div style=\"font-weight: 600; font-size: 15.5px; color: #f0ebe2;\"><span style=\"margin-right: 8px;\">💡<\u002Fspan>{{ item.title }}<\u002Fdiv>\n                <span style=\"{{ item.chevronStyle }}\">▾<\u002Fspan>\n              <\u002Fdiv>\n              <div style=\"{{ item.panelStyle }}\">\n                <div style=\"overflow: hidden;\">\n                  <div style=\"{{ item.drawerStyle }}\"><div style=\"color: #c9c1b6; font-size: 15px;\">{{ item.reveal }}<\u002Fdiv><\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <sc-if value=\"{{ showExamples }}\" hint-placeholder-val=\"{{ true }}\">\n      <div style=\"max-width: 760px; margin: 0 auto;\">\n        <h2 style=\"font-family: Poppins, sans-serif; font-size: 23px; font-weight: 700; margin: 0 0 4px; color: #f6f2ea;\">Real examples<\u002Fh2>\n        <p style=\"color: #a39c90; font-size: 15px; margin: 0 0 20px;\">The full workflow, start to finish. Tap to open.<\u002Fp>\n        <sc-for list=\"{{ examples }}\" as=\"item\" hint-placeholder-count=\"3\">\n          <div style=\"{{ item.boxStyle }}\">\n            <div sc-camel-on-click=\"{{ item.toggle }}\" style=\"display: flex; align-items: center; justify-content: space-between; padding: 18px 20px; cursor: pointer;\">\n              <div style=\"font-weight: 700; font-size: 16.5px; font-family: Poppins, sans-serif; color: #f0ebe2;\"><span style=\"margin-right: 8px;\">{{ item.icon }}<\u002Fspan>{{ item.title }}<\u002Fdiv>\n              <span style=\"{{ item.chevronStyle }}\">▾<\u002Fspan>\n            <\u002Fdiv>\n            <div style=\"{{ item.panelStyle }}\">\n              <div style=\"overflow: hidden;\">\n                <div style=\"{{ item.drawerStyle }}\">\n                  <div style=\"font-style: italic; background: rgba(255,255,255,0.05); border-radius: 10px; padding: 14px; font-size: 14.5px; color: #a39c90; margin-bottom: 14px;\">{{ item.context }}<\u002Fdiv>\n\n                  <div style=\"border: 1.5px solid rgba(139,92,246,0.45); background: rgba(139,92,246,0.1); border-radius: 12px; padding: 14px 16px; margin-bottom: 12px;\">\n                    <div style=\"font-weight: 700; font-size: 14px; color: #c4b5fd; margin-bottom: 6px;\">💬 You ask:<\u002Fdiv>\n                    <div style=\"font-size: 14.5px; color: #e6e0d8;\">{{ item.prompt }}<\u002Fdiv>\n                  <\u002Fdiv>\n\n                  <div style=\"border: 1.5px solid rgba(16,185,129,0.45); background: rgba(16,185,129,0.1); border-radius: 12px; padding: 14px 16px; margin-bottom: 12px;\">\n                    <div style=\"font-weight: 700; font-size: 14px; color: #6ee7b7; margin-bottom: 6px;\">🤖 AI gives you:<\u002Fdiv>\n                    <div style=\"font-size: 14.5px; color: #e6e0d8;\">{{ item.response }}<\u002Fdiv>\n                  <\u002Fdiv>\n\n                  <div style=\"border: 1.5px solid rgba(245,158,11,0.45); background: rgba(245,158,11,0.11); border-radius: 12px; padding: 14px 16px; margin-bottom: 12px;\">\n                    <div style=\"font-weight: 700; font-size: 14px; color: #fbbf24; margin-bottom: 6px;\">✏️ You then:<\u002Fdiv>\n                    <div style=\"font-size: 14.5px; color: #e6e0d8;\">{{ item.edit }}<\u002Fdiv>\n                  <\u002Fdiv>\n\n                  <div style=\"background: rgba(245,158,11,0.16); border-radius: 10px; padding: 12px 14px; font-size: 14px; color: #e8dcc4;\">\n                    <b>Why this worked:<\u002Fb> {{ item.tip }}\n                  <\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nconst COLORS = { blue: '#3b82f6', purple: '#8b5cf6', green: '#10b981', gold: '#f59e0b', red: '#ef4444' };\n\nfunction tint(hex, alpha) {\n  const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);\n  return `rgba(${r},${g},${b},${alpha})`;\n}\n\nclass Component extends DCLogic {\n  state = {\n    activeTab: 'what',\n    revealed: {\n      infallible: false, authority: false, timesaver: false, replacement: false,\n      claude: false, chatgpt: false, gemini: false, meta: false, copilot: false,\n      goal: false, perspectives: false, whoyouare: false,\n      ex1: true, ex2: false, ex3: false\n    }\n  };\n\n  setTab(id) { this.setState({ activeTab: id }); }\n  toggleReveal(key) { this.setState(s => ({ revealed: { ...s.revealed, [key]: !s.revealed[key] } })); }\n\n  withReveal(arr) {\n    const r = this.state.revealed;\n    return arr.map(it => {\n      const revealed = !!r[it.key];\n      const accent = it.accent || '#9a9186';\n      return {\n        ...it,\n        revealed,\n        toggle: () => this.toggleReveal(it.key),\n        chevronStyle: { display: 'inline-block', color: accent, transition: 'transform 0.25s ease', transform: revealed ? 'rotate(180deg)' : 'rotate(0deg)' },\n        panelStyle: { display: 'grid', gridTemplateRows: revealed ? '1fr' : '0fr', transition: 'grid-template-rows 0.35s ease' },\n        boxStyle: {\n          background: '#211f26', borderRadius: '16px', border: '1px solid rgba(255,255,255,0.08)',\n          borderLeft: `3px solid ${accent}`, boxShadow: revealed ? `0 4px 16px ${tint(accent, 0.18)}` : '0 1px 3px rgba(0,0,0,0.3)',\n          marginBottom: '14px', overflow: 'hidden', transition: 'box-shadow 0.3s ease'\n        },\n        drawerStyle: {\n          margin: '0 16px 16px 16px', background: tint(accent, 0.1), border: `1px solid ${tint(accent, 0.3)}`,\n          borderLeft: `4px solid ${accent}`, borderRadius: '12px', padding: '16px 18px',\n          transform: revealed ? 'translateX(0)' : 'translateX(-16px)', opacity: revealed ? 1 : 0,\n          transition: 'transform 0.35s cubic-bezier(0.2,0.8,0.2,1), opacity 0.3s ease', boxShadow: `0 4px 14px ${tint(accent, 0.15)}`\n        }\n      };\n    });\n  }\n\n  badgeFor(color, size) {\n    return {\n      width: size + 'px', height: size + 'px', borderRadius: '12px', background: tint(color, 0.16),\n      color, display: 'flex', alignItems: 'center', justifyContent: 'center',\n      fontSize: size > 36 ? '20px' : '16px', fontWeight: 700, marginBottom: '12px',\n      boxShadow: `0 0 0 1px ${tint(color, 0.25)} inset`\n    };\n  }\n\n  cardStyles(color) {\n    return {\n      cardStyle: {\n        background: `linear-gradient(160deg, ${tint(color, 0.12)}, #211f26 60%)`,\n        borderRadius: '16px', padding: '20px', borderTop: `3px solid ${tint(color, 0.7)}`,\n        borderLeft: '1px solid rgba(255,255,255,0.08)', borderRight: '1px solid rgba(255,255,255,0.08)', borderBottom: '1px solid rgba(255,255,255,0.08)',\n        boxShadow: '0 1px 3px rgba(0,0,0,0.3)', transition: 'transform 0.2s ease, box-shadow 0.2s ease'\n      },\n      hoverStyle: { transform: 'translateY(-4px)', boxShadow: `0 14px 30px ${tint(color, 0.3)}` }\n    };\n  }\n\n  renderVals() {\n    const tab = this.state.activeTab;\n    const tabsDef = [\n      { id: 'what', label: 'What is AI?', color: COLORS.blue },\n      { id: 'tools', label: 'The tools', color: COLORS.purple },\n      { id: 'when', label: 'When to use it', color: COLORS.gold },\n      { id: 'how', label: 'How to ask', color: COLORS.green },\n      { id: 'examples', label: 'Examples', color: COLORS.blue }\n    ];\n\n    const tabs = tabsDef.map(t => {\n      const active = t.id === tab;\n      return {\n        ...t, active,\n        select: () => this.setTab(t.id),\n        navStyle: {\n          padding: 'clamp(11px,2.6vw,12px) clamp(14px,3.5vw,18px)', lineHeight: 1, borderRadius: '999px', fontWeight: 600, fontSize: '14px', cursor: 'pointer',\n          border: active ? '1.5px solid transparent' : '1.5px solid rgba(255,255,255,0.12)',\n          background: active ? t.color : '#211f26', color: active ? '#fff' : '#cfc8bd',\n          boxShadow: active ? `0 4px 14px ${tint(t.color, 0.4)}` : 'none',\n          transition: 'all 0.2s ease'\n        },\n        navHoverStyle: active ? { opacity: 0.95 } : { background: '#2a2730', borderColor: 'rgba(255,255,255,0.2)' }\n      };\n    });\n\n    const goodAt = [\n      { icon: '🔍', title: 'Research', text: 'Pull together information fast, summarize long documents, find sources to dig into further.', color: COLORS.blue },\n      { icon: '🗂️', title: 'Structuring', text: 'Turn scattered notes into a clear outline, agenda, or sequence.', color: COLORS.purple },\n      { icon: '💡', title: 'Brainstorming', text: 'Generate options and angles you haven\\u2019t thought of yet. You pick what fits.', color: COLORS.gold },\n      { icon: '✏️', title: 'Editing', text: 'Tighten your writing, catch awkward phrasing, suggest clearer wording.', color: COLORS.green }\n    ].map(it => ({ ...it, badgeStyle: this.badgeFor(it.color, 40), ...this.cardStyles(it.color) }));\n\n    const whatNot = this.withReveal([\n      { key: 'infallible', accent: COLORS.red, title: 'It\\u2019s not infallible', reveal: 'AI states false things as confidently as true ones. Always double-check facts: names, dates, references, numbers, before you use them.' },\n      { key: 'authority', accent: COLORS.red, title: 'It\\u2019s not an authority', reveal: 'AI has no real expertise and no accountability for what it tells you. It can help you think something through. It can\\u2019t make the call for you.' },\n      { key: 'timesaver', accent: COLORS.red, title: 'It\\u2019s not always a time-saver', reveal: 'For a quick two-line message, just typing it yourself is often faster than explaining it to AI and editing the result.' },\n      { key: 'replacement', accent: COLORS.red, title: 'It\\u2019s not a replacement for you', reveal: 'People want your voice and your perspective. AI can help you get there faster. It can\\u2019t get there for you.' }\n    ]);\n\n    const tools = this.withReveal([\n      { key: 'claude', name: 'Claude', letter: 'C', accent: COLORS.blue, where: 'claude.ai', bestFor: 'Long writing, careful reasoning, thoughtful editing', context: 'Good at holding a long conversation and staying consistent. Handy for drafting something over several passes.' },\n      { key: 'chatgpt', name: 'ChatGPT', letter: 'G', accent: COLORS.green, where: 'chatgpt.com', bestFor: 'General-purpose help, quick answers, brainstorming', context: 'The most widely used option, a solid default for almost anything, from outlining a paper to explaining a concept simply.' },\n      { key: 'gemini', name: 'Gemini', letter: 'G', accent: COLORS.purple, where: 'gemini.google.com', bestFor: 'Anything tied to Google: Docs, Gmail, Search', context: 'Built into Google\\u2019s tools, so it\\u2019s handy if you already live in Gmail and Docs for your writing.' },\n      { key: 'meta', name: 'Meta AI', letter: 'M', accent: COLORS.gold, where: 'Inside Instagram, Facebook, WhatsApp', bestFor: 'Quick help without leaving the app', context: 'Useful in the moment, drafting a caption or reply right inside the app you\\u2019re already posting from.' },\n      { key: 'copilot', name: 'Copilot', letter: 'C', accent: '#a8a29e', where: 'Built into Word, Outlook, Windows', bestFor: 'Editing inside documents and email you already have open', context: 'Worth using if you run on Microsoft 365. It works right inside the doc or email you\\u2019re already writing.' }\n    ]).map(it => ({ ...it, badgeStyle: this.badgeFor(it.accent, 40) }));\n\n    const whenHelps = [\n      { icon: '🔍', title: 'Research', text: 'Digging into a topic, a text\\u2019s background, or how others have approached something.', color: COLORS.blue },\n      { icon: '🗂️', title: 'Structuring', text: 'Turning a pile of notes into an outline or agenda you can actually follow.', color: COLORS.purple },\n      { icon: '💡', title: 'Brainstorming', text: 'Widening your options before you commit to an angle or approach.', color: COLORS.gold },\n      { icon: '✏️', title: 'Editing', text: 'Polishing a draft you\\u2019ve already written in your own words.', color: COLORS.green }\n    ].map(it => ({ ...it, badgeStyle: this.badgeFor(it.color, 40), ...this.cardStyles(it.color) }));\n\n    const wastesTime = [\n      { title: 'Quick writing', text: 'A two-sentence reminder to a group? Just type it. Explaining it to AI takes longer.' },\n      { title: 'Expecting AI to decide', text: '\\u201cWhat should I write about this week?\\u201d isn\\u2019t a prompt. It\\u2019s a decision only you can make.' },\n      { title: 'Outsourcing your voice', text: 'Posting AI\\u2019s writing unedited. People know your voice, unedited AI text reads generic, and it shows.' }\n    ];\n\n    const workflow = [\n      { num: 1, title: 'Write first', text: 'Get your own rough draft down, even messy. This keeps your voice as the foundation.', color: COLORS.blue },\n      { num: 2, title: 'Ask specific', text: 'Tell it exactly what you want, for whom, and why. Vague questions get vague answers.', color: COLORS.purple },\n      { num: 3, title: 'Read & edit', text: 'Never paste AI\\u2019s output straight through. Change what doesn\\u2019t sound like you.', color: COLORS.green },\n      { num: 4, title: 'Ask alternatives', text: 'If the first answer isn\\u2019t it, ask for another angle. You\\u2019re allowed to push back.', color: COLORS.gold }\n    ].map(it => ({ ...it, badgeStyle: { ...this.badgeFor(it.color, 36), borderRadius: '50%', fontWeight: 700 }, ...this.cardStyles(it.color) }));\n\n    const comparisons = [\n      { label: 'Vague vs. specific', bad: 'Write something for my post.', good: 'Write a 100-word Instagram caption inviting people to Wednesday\\u2019s study group. Warm, casual tone, no corporate language.' },\n      { label: 'Generic vs. specific edit', bad: 'Make this better.', good: 'Tighten this paragraph without changing the meaning. Cut anything that sounds stiff or overly formal.' },\n      { label: 'No context vs. with context', bad: 'Explain this passage.', good: 'I\\u2019m teaching this to people who\\u2019ve never studied it before. Explain it in plain language, no jargon.' }\n    ];\n\n    const advancedTips = this.withReveal([\n      { key: 'goal', accent: COLORS.gold, title: 'Tell AI your goal, not just the task', reveal: 'Instead of \\u201csummarize this article,\\u201d try \\u201csummarize this so I can decide if it\\u2019s worth quoting in what I\\u2019m writing.\\u201d The goal shapes a far more useful answer.' },\n      { key: 'perspectives', accent: COLORS.gold, title: 'Ask for multiple perspectives', reveal: '\\u201cGive me three different ways to open this\\u201d gets you options to choose from, instead of one answer to accept or reject.' },\n      { key: 'whoyouare', accent: COLORS.gold, title: 'Tell AI who you are', reveal: '\\u201cI\\u2019m a student writing for a small, mixed-age audience\\u201d changes the answer more than almost anything else you can say.' }\n    ]);\n\n    const examples = this.withReveal([\n      {\n        key: 'ex1', icon: '🔍', accent: COLORS.blue, title: 'Deep research',\n        context: 'You\\u2019re preparing a talk and want background on a historical detail before you write about it.',\n        prompt: 'I\\u2019m preparing a talk that touches on ancient gleaning laws. Explain the historical and legal background: what the law required, and why it mattered socially. Keep it to a few paragraphs I can skim.',\n        response: 'AI explains the relevant laws, how they functioned as an early social safety net for the poor and outsiders, and why one figure exceeding the law signals something about his character.',\n        edit: 'You verify the details against your own source, cut the padding, and fold two sentences into your own illustration about generosity.',\n        tip: 'Deep research works because you gave it a narrow, factual question: background info, not the talk itself.'\n      },\n      {\n        key: 'ex2', icon: '📱', accent: COLORS.purple, title: 'Writing a post',\n        context: 'It\\u2019s Tuesday and you need a social post reminding people about Wednesday\\u2019s study group, but you\\u2019re stuck on phrasing.',\n        prompt: 'Draft a short social post (under 60 words) reminding people that study group is tomorrow at 6:30pm. Warm and inviting, not stiff. Mention we\\u2019re starting a new topic.',\n        response: 'AI drafts a friendly, upbeat post with the time, day, and topic mentioned, plus a light call-to-action to bring a friend.',\n        edit: 'You swap a couple of phrases that don\\u2019t sound like you, add the actual room number, and cut the stock AI sign-off at the end.',\n        tip: 'A word count and one specific detail (the topic) kept the draft from being generic. Quick edits made it sound like you.'\n      },\n      {\n        key: 'ex3', icon: '💭', accent: COLORS.gold, title: 'Brainstorming',\n        context: 'You\\u2019ve got a talk on patience but you\\u2019re blanking on a modern illustration people will relate to.',\n        prompt: 'I\\u2019m writing a talk on patience for a mixed-age audience. Give me 5 modern illustrations of patience, nothing overused like \\u201ctraffic jams.\\u201d',\n        response: 'AI lists five: a slow-cooked meal vs. microwave food, marathon training, waiting on a diagnosis, learning an instrument, and a toddler learning to walk.',\n        edit: 'Two ideas feel flat, but marathon training clicks. You build it out with a friend\\u2019s real story instead of using it as-is.',\n        tip: 'You asked for options, not a final answer. The value was picking one and making it yours.'\n      }\n    ]);\n\n    return {\n      tabs,\n      showWhat: tab === 'what', showTools: tab === 'tools', showWhen: tab === 'when', showHow: tab === 'how', showExamples: tab === 'examples',\n      cardHoverStyle: { transform: 'translateY(-3px)', boxShadow: '0 10px 24px rgba(0,0,0,0.4)' },\n      goodAt, whatNot, tools, whenHelps, wastesTime, workflow, comparisons, advancedTips, examples\n    };\n  }\n}\n\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
